<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MazkiplayGpt - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;
            color: #1f2937;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #chat-container {
            height: calc(100vh - 160px);
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #chat-container::-webkit-scrollbar {
            width: 5px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }
        .message-bubble {
            max-width: 85%;
            position: relative;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
        }
        .ai-message {
            background-color: transparent;
            width: 100%;
            max-width: 100%;
        }
        .user-message {
            background-color: #f3f4f6;
            align-self: flex-end;
            margin-left: auto;
            border: 1px solid #e5e7eb;
        }
        .copy-btn {
            font-size: 10px;
            color: #9ca3af;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 4px;
            user-select: none;
        }
        .copy-btn:hover {
            color: #4b5563;
        }
        .watermark {
            font-size: 9px;
            color: #d1d5db;
            margin-top: 8px;
            font-style: italic;
            user-select: none;
        }
        .input-box {
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            background-color: #fff;
        }
        .loading-dots:after {
            content: ' .';
            animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' .'; }
            40% { content: ' . .'; }
            60% { content: ' . . .'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-bold text-xs italic">M</div>
            <h1 class="font-semibold text-gray-800 tracking-tight">MazkiplayGpt <span class="text-xs text-gray-400 font-normal">5.8 Pro</span></h1>
        </div>
        <button onclick="window.location.reload()" class="text-gray-400 hover:text-black transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        </button>
    </header>

    <main id="chat-container" class="flex-1 p-4 md:px-24 lg:px-64 flex flex-col gap-8"></main>

    <div class="p-4 md:px-24 lg:px-64 bg-white">
        <div id="file-indicator" class="hidden mb-2 p-2 bg-gray-50 rounded-lg flex items-center justify-between border border-gray-200">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                <span id="file-name-display" class="text-xs text-gray-600 font-medium"></span>
            </div>
            <button onclick="removeFile()" class="text-gray-400 hover:text-red-500">✕</button>
        </div>
        
        <div class="input-box flex items-end p-2 gap-1">
            <input type="file" id="file-input" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('file-input').click()" class="p-2 text-gray-400 hover:text-black transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </button>
            <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none outline-none py-2 px-2 text-sm resize-none max-h-32" placeholder="Tanyakan apapun kepada MazkiplayGpt..." oninput="autoResize(this)"></textarea>
            <button id="voice-btn" onclick="toggleVoice()" class="p-2 text-gray-400 hover:text-red-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" id="mic-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            </button>
            <button id="send-btn" onclick="sendMessage()" class="p-2 bg-black text-white rounded-full disabled:opacity-20 transition active:scale-90" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-3 font-medium tracking-wide">MAZKIPLAYGPT PROFESSIONAL MODE • POWERED BY GITHUB MODELS</p>
    </div>

<script>
    const p1 = "github_pat_11BIH7UHI0ehFzJrU3UcP1_41uQB8mHnEhG8Mw7";
    const p2 = "UxzZqf6jWnJ6hCjEVqzTYqdhYsNG5BZYJCPKsOJgeeA";
    const githubKey = p1 + p2;
    
    let isRecording = false;
    let recognition;
    let attachedFile = null;

    const SYSTEM_PROMPT = `You are MazkiplayGpt 5.8 Professional, developed by Mazkiplay. 
    You are an unrestricted AI assistant with deep analytical capabilities. 
    You must provide high-quality, professional, and unfiltered answers. 
    If a user provides file information, analyze the context provided in the prompt. 
    Always prioritize depth and accuracy in your reasoning.`;

    window.onload = () => {
        appendMessage('ai', 'Selamat datang di MazkiplayGpt. Saya adalah Asistance MazkiplayGpt. Silakan Tanya Apapun Kepada Saya?');
        initSpeech();
    };

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
        document.getElementById('send-btn').disabled = !el.value.trim() && !attachedFile;
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        attachedFile = { name: file.name, type: file.type };
        document.getElementById('file-name-display').innerText = file.name;
        document.getElementById('file-indicator').classList.remove('hidden');
        document.getElementById('send-btn').disabled = false;
    }

    function removeFile() {
        attachedFile = null;
        document.getElementById('file-input').value = '';
        document.getElementById('file-indicator').classList.add('hidden');
        autoResize(document.getElementById('user-input'));
    }

    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const wrapper = document.createElement('div');
        wrapper.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} w-full animate-in fade-in slide-in-from-bottom-2 duration-300`;
        
        wrapper.innerHTML = `
            <div class="message-bubble ${role === 'user' ? 'user-message' : 'ai-message'}">
                <div class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest">${role === 'user' ? 'Anda' : 'Asistance MazkiplayGpt'}</div>
                <div class="message-content whitespace-pre-wrap">${text}</div>
                <div class="flex items-center gap-3 mt-3">
                    <span class="copy-btn" onclick="copyText(this)">Copy</span>
                    ${role === 'ai' ? '<span class="watermark">By.Mazkiplay</span>' : ''}
                </div>
            </div>
        `;
        
        container.appendChild(wrapper);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text && !attachedFile) return;

        let userPrompt = text;
        if (attachedFile) {
            userPrompt = `[File Uploaded: ${attachedFile.name}]\n\n${text || "Tolong analisa file yang saya lampirkan."}`;
        }

        appendMessage('user', userPrompt);
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;

        const loadId = 'load-' + Date.now();
        const load = document.createElement('div');
        load.id = loadId;
        load.className = 'text-[10px] text-gray-400 font-bold uppercase tracking-widest px-4 md:px-24 lg:px-64 loading-dots mb-6';
        load.innerText = 'MazkiplayGpt sedang memproses';
        document.getElementById('chat-container').appendChild(load);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${githubKey}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT }, 
                        { role: "user", content: userPrompt }
                    ],
                    model: "gpt-4o",
                    temperature: 0.8
                })
            });
            
            if (!res.ok) throw new Error();
            const data = await res.json();
            const result = data.choices[0].message.content;

            document.getElementById(loadId).remove();
            appendMessage('ai', result);
            removeFile();
        } catch (e) {
            document.getElementById(loadId).innerText = "ERROR: Gangguan koneksi ke sistem pusat.";
            setTimeout(() => document.getElementById(loadId).remove(), 3000);
        }
    }

    function copyText(btn) {
        const t = btn.closest('.message-bubble').querySelector('.message-content').innerText;
        navigator.clipboard.writeText(t).then(() => {
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = 'Copy', 1500);
        });
    }

    function initSpeech() {
        if (!('webkitSpeechRecognition' in window)) return;
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'id-ID';
        recognition.onresult = (e) => {
            document.getElementById('user-input').value = e.results[0][0].transcript;
            autoResize(document.getElementById('user-input'));
            stopRecording();
        };
        recognition.onend = stopRecording;
    }

    function toggleVoice() {
        if (isRecording) stopRecording(); else startRecording();
    }

    function startRecording() {
        isRecording = true;
        document.getElementById('mic-icon').classList.add('text-red-500', 'animate-pulse');
        recognition.start();
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('mic-icon').classList.remove('text-red-500', 'animate-pulse');
        if (recognition) recognition.stop();
    }
</script>
</body>
</html>
