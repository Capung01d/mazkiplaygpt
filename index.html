<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MazkiplayGpt 5.8 Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #0d0d0d;
            margin: 0;
            height: 100vh;
            height: -webkit-fill-available;
            width: 100vw;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            height: -webkit-fill-available;
        }
        .app-container {
            height: 100vh;
            height: -webkit-fill-available;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            position: relative;
        }
        .sidebar {
            background-color: #fcfcfc;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid #f0f0f0;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 600;
            width: 80%;
            transform: translateX(-100%);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .message-user-bubble {
            background-color: #f4f4f4;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            display: inline-block;
            max-width: 88%;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .dashboard-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 24px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .dashboard-screen.hidden {
            transform: translateY(-110%);
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 550;
        }
        .overlay.active {
            display: block;
        }
        #chat-history {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            padding-bottom: 140px;
            display: flex;
            flex-direction: column;
        }
        #chat-history::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .btn-touch {
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        pre {
            background: #1a1a1a;
            color: #f8f8f2;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
            font-size: 12px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .input-area-fixed {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="antialiased">

<div id="dashboard" class="dashboard-screen">
    <div class="flex-1 flex flex-col items-center justify-center text-center py-10">
        <div class="w-20 h-20 bg-black rounded-[2rem] flex items-center justify-center text-white shadow-2xl mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        </div>
        <h1 class="text-3xl font-black tracking-tighter mb-1">MazkiplayGpt 5.8</h1>
        <p class="text-gray-400 text-[10px] font-black uppercase tracking-[0.3em] mb-10 text-center text-red-500">Hybrid Strategy Engine Active</p>
        
        <div class="w-full max-w-sm space-y-3 mb-10">
            <div class="p-3 bg-gray-50 rounded-2xl border border-gray-100">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-2">Provider Engine</label>
                <select id="engine-selector" class="w-full bg-white border-none rounded-xl p-3 text-xs font-bold outline-none shadow-sm">
                    <option value="github">GITHUB MODELS (TOKEN SET)</option>
                    <option value="openrouter">OPENROUTER (PREMIUM)</option>
                    <option value="gemini">GOOGLE GEMINI (BACKUP)</option>
                </select>
            </div>
            <div class="p-3 bg-gray-50 rounded-2xl border border-gray-100">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-2">Target Model ID</label>
                <input id="model-id" type="text" value="gpt-4o" class="w-full bg-white border-none rounded-xl p-3 text-xs font-bold outline-none shadow-sm" placeholder="Contoh: gpt-4o">
            </div>
            <div class="p-3 bg-gray-50 rounded-2xl border border-gray-100">
                <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-2">Custom API Key (Optional)</label>
                <input id="api-key-input" type="password" class="w-full bg-white border-none rounded-xl p-3 text-xs font-bold outline-none shadow-sm" placeholder="Biarkan kosong untuk token default">
            </div>
        </div>

        <button onclick="startApp()" class="w-full max-w-xs btn-touch bg-black text-white rounded-[2rem] font-black text-sm tracking-widest shadow-2xl active:scale-95 transition uppercase">
            Mulai MazkiplayGpt 5.8
        </button>
    </div>
</div>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div class="app-container">
    <div id="sidebar" class="sidebar flex flex-col p-6">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-black rounded-xl flex items-center justify-center text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
                <span class="font-bold text-lg tracking-tight">MazkiplayGpt</span>
            </div>
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-500">✕</button>
        </div>
        <button onclick="window.location.reload()" class="w-full btn-touch bg-gray-100 hover:bg-gray-200 rounded-2xl transition text-sm font-bold flex items-center gap-3 mb-6 px-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            <span>Sesi Baru</span>
        </button>
        <div class="flex-1 overflow-y-auto space-y-1">
            <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest px-2 mb-3">Model Aktif</p>
            <div id="current-model-badge" class="p-4 text-[10px] font-black text-red-500 bg-red-50 border border-red-100 rounded-xl mb-2 uppercase tracking-tighter">ENGINE READY</div>
        </div>
    </div>

    <header class="flex items-center justify-between p-4 bg-white/80 backdrop-blur-xl sticky top-0 z-40 border-b border-gray-50">
        <button onclick="toggleSidebar()" class="p-2 -ml-2 w-10 h-10 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="font-bold text-[10px] tracking-widest uppercase opacity-70">MazkiplayGpt 5.8 Hybrid</div>
        <div class="w-10"></div>
    </header>

    <main id="chat-history" class="px-4 space-y-8 pt-4">
        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4" id="welcome-container">
            <div class="w-20 h-20 bg-black rounded-[2.2rem] flex items-center justify-center shadow-2xl mb-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
            <h1 class="text-2xl font-black text-gray-900 mb-3 tracking-tighter">Halo, Partner Strategis.</h1>
            <p class="text-gray-400 text-[11px] leading-relaxed mb-8 max-w-[260px] font-semibold italic text-center">
                "GitHub Engine terintegrasi. Sistem siap melakukan pengolahan data tingkat lanjut."
            </p>
        </div>
    </main>

    <div class="input-area-fixed">
        <div class="max-w-3xl mx-auto flex flex-col gap-2 p-4">
            <div class="flex items-center bg-[#f4f4f4] rounded-[1.8rem] px-3">
                <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none outline-none py-3 px-4 text-sm md:text-base resize-none max-h-24" placeholder="Tanyakan sesuatu..."></textarea>
                <button id="send-btn" onclick="handleSend()" class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center disabled:opacity-10 transition-transform active:scale-90" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
                </button>
            </div>
            <div class="text-[7px] text-gray-300 text-center py-2 font-black uppercase tracking-[0.4em]">Hybrid Engine Integrated By.MazkiplayGpt</div>
        </div>
    </div>
</div>

<script>
    let p1 = "github_pat_11BIH7UHI0ehFzJrU3UcP1_41uQB8mHnEhG8Mw7";
    let p2 = "UxzZqf6jWnJ6hCjEVqzTYqdhYsNG5BZYJCPKsOJgeeA";
    let ACTIVE_KEY = p1 + p2;
    
    const BACKUP_GEMINI = "AIzaSyBiwFcqui3_wOdyerlV_HI4g2H3jh1y5IQ";

    function startApp() {
        const customKey = document.getElementById('api-key-input').value.trim();
        if (customKey) ACTIVE_KEY = customKey;
        
        const model = document.getElementById('model-id').value;
        document.getElementById('current-model-badge').innerText = model.toUpperCase();
        document.getElementById('dashboard').classList.add('hidden');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    document.getElementById('user-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight > 96 ? 96 : this.scrollHeight) + 'px';
        document.getElementById('send-btn').disabled = !this.value.trim();
    });

    async function handleSend() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;
        
        const welcome = document.getElementById('welcome-container');
        if (welcome) welcome.remove();
        
        appendMessage('user', text);
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('send-btn').disabled = true;
        
        const engine = document.getElementById('engine-selector').value;
        const modelId = document.getElementById('model-id').value;
        const thinkingId = appendThinking();

        let responseText = "";
        try {
            if (engine === 'github') {
                responseText = await queryGitHub(text, modelId);
            } else if (engine === 'openrouter') {
                responseText = await queryOpenRouter(text, modelId);
            } else {
                responseText = await queryGemini(text);
            }
        } catch (err) {
            responseText = "Sistem gagal merespons. Periksa koneksi atau validitas Token Anda.";
        }
        
        removeThinking(thinkingId);
        appendMessage('ai', responseText);
    }

    async function queryGitHub(prompt, model) {
        const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${ACTIVE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "messages": [{"role": "user", "content": prompt}],
                "model": model,
                "temperature": 0.7
            })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        return data.choices[0].message.content + "\n\nBy.MazkiplayGpt";
    }

    async function queryOpenRouter(prompt, model) {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${ACTIVE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "model": model,
                "messages": [{"role": "user", "content": prompt}]
            })
        });
        const data = await response.json();
        return data.choices[0].message.content + "\n\nBy.MazkiplayGpt";
    }

    async function queryGemini(prompt) {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${BACKUP_GEMINI}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });
        const data = await response.json();
        return (data.candidates?.[0]?.content?.parts?.[0]?.text || "Limit tercapai.") + "\n\nBy.MazkiplayGpt";
    }

    function appendMessage(role, text) {
        const hist = document.getElementById('chat-history');
        const section = document.createElement('div');
        section.className = `w-full flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-8`;
        const contentWrapper = document.createElement('div');
        contentWrapper.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} max-w-[90%]`;
        
        if (role === 'user') {
            const bubble = document.createElement('div');
            bubble.className = "message-user-bubble shadow-sm";
            bubble.innerText = text;
            contentWrapper.appendChild(bubble);
        } else {
            const avatar = document.createElement('div');
            avatar.className = "w-6 h-6 bg-black rounded-lg mb-2 flex items-center justify-center text-[8px] text-white font-black";
            avatar.innerText = "M";
            contentWrapper.appendChild(avatar);
            
            const textEl = document.createElement('div');
            textEl.className = "text-gray-800 text-[13px] leading-relaxed";
            textEl.innerHTML = text.split('\n').map(p => p.trim() ? `<p class="mb-2">${p}</p>` : '<br>').join('');
            contentWrapper.appendChild(textEl);
        }
        
        section.appendChild(contentWrapper);
        hist.appendChild(section);
        hist.scrollTo({ top: hist.scrollHeight, behavior: 'smooth' });
    }

    function appendThinking() {
        const id = 'think-' + Date.now();
        const hist = document.getElementById('chat-history');
        const div = document.createElement('div');
        div.id = id;
        div.className = "py-4 text-[8px] font-black tracking-[0.3em] text-gray-300 animate-pulse uppercase";
        div.innerText = "Processing...";
        hist.appendChild(div);
        return id;
    }

    function removeThinking(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }
</script>
</body>
</html>
