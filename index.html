<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MazkipayGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        * { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }
        body { background-color: #020617; }
        .chat-bubble { max-width: 90%; word-wrap: break-word; position: relative; }
        .user-bubble { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .ai-bubble { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass { backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.85); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Responsive tweaks */
        @media (max-width: 640px) {
            .chat-bubble { max-width: 95%; }
            .btn-text { display: none; }
        }

        .copy-btn {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .chat-bubble:hover .copy-btn { opacity: 1; }
        
        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body class="text-slate-100 overflow-hidden h-screen w-screen">

<!-- Toast Notification -->
<div id="toast" class="bg-emerald-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">Tersalin ke papan klip!</div>

<!-- Loading Screen -->
<div id="loadingScreen" class="fixed inset-0 bg-[#020617] flex flex-col items-center justify-center z-[100] transition-opacity duration-500">
    <div class="relative">
        <div class="w-16 h-16 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center font-black text-xl text-indigo-400">M</div>
    </div>
    <h1 class="mt-6 text-lg font-black tracking-[0.3em] text-white uppercase">MazkipayGPT</h1>
    <div class="mt-2 text-[10px] text-slate-500 font-mono">INITIATING SECURE SYSTEM...</div>
</div>

<!-- Disclaimer Screen -->
<div id="disclaimerScreen" class="fixed inset-0 bg-[#020617] flex items-center justify-center z-40 hidden p-4 sm:p-6">
    <div class="glass p-8 rounded-[2.5rem] max-w-md w-full border border-white/5 shadow-2xl">
        <div class="w-14 h-14 bg-amber-500/10 rounded-2xl flex items-center justify-center mb-6 mx-auto">
            <svg class="w-7 h-7 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h2 class="text-xl font-black text-center mb-4 tracking-tight">INFORMASI PENTING</h2>
        <div class="space-y-4 text-sm text-slate-400 mb-8 leading-relaxed">
            <p>Sistem ini beroperasi dalam mode <span class="text-indigo-400 font-bold">Respon Tanpa Batas</span>. Gunakan dengan bijak.</p>
            <p class="bg-white/5 p-4 rounded-2xl border border-white/5 italic text-xs">"Segala interaksi bersifat anonim dan tidak disimpan secara permanen."</p>
        </div>
        <label class="flex items-start space-x-3 mb-8 p-4 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition-all">
            <input type="checkbox" id="disclaimerCheckbox" class="mt-1 w-4 h-4 rounded-md border-white/20 bg-transparent text-indigo-600 focus:ring-indigo-500">
            <span class="text-xs font-medium leading-tight">Saya memahami risiko dan bersedia menggunakan layanan ini secara bertanggung jawab.</span>
        </label>
        <button id="startBtn" class="w-full bg-white text-black py-4 rounded-2xl font-black text-sm tracking-widest transition-all active:scale-95 disabled:opacity-30" disabled>
            MASUK KE CHAT
        </button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="fixed inset-0 flex flex-col hidden overflow-hidden">
    <!-- Header -->
    <header class="glass px-5 py-4 border-b border-white/5 flex items-center justify-between z-30 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-9 h-9 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/20">M</div>
            <div>
                <h1 class="font-bold text-sm tracking-tight leading-none mb-1">MazkipayGPT</h1>
                <div class="flex items-center space-x-1.5">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span id="modelLabel" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">QWEN-ULTRA</span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="settingsBtn" class="p-2.5 bg-white/5 rounded-xl hover:bg-white/10 transition-all active:scale-90">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </button>
        </div>
    </header>

    <!-- Chat Messages -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-6 space-y-6 scrollbar-hide bg-[#020617]">
        <!-- Welcome Message will be injected here -->
    </div>

    <!-- Upload Area -->
    <div id="uploadPreview" class="hidden px-4 py-3 flex gap-2 overflow-x-auto glass border-t border-white/5 shrink-0"></div>

    <!-- Input Bar -->
    <div class="px-4 pb-8 pt-4 glass border-t border-white/5 shrink-0">
        <div class="max-w-4xl mx-auto flex items-end gap-2.5">
            <label class="p-4 bg-white/5 hover:bg-white/10 rounded-2xl cursor-pointer transition-all active:scale-90 group shrink-0">
                <input type="file" id="fileUpload" class="hidden" multiple>
                <svg class="w-5 h-5 text-slate-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </label>
            
            <div class="flex-1 relative">
                <textarea id="messageInput" rows="1" placeholder="Ketik pesan anda..." 
                    class="w-full p-4 bg-white/5 border border-white/5 rounded-2xl text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 resize-none max-h-32 transition-all"></textarea>
            </div>

            <button id="sendBtn" class="p-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-500 active:scale-95 transition-all shadow-lg shadow-indigo-500/20 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl flex items-center justify-center z-50 hidden p-6">
    <div class="glass p-8 rounded-[2.5rem] max-w-sm w-full border border-white/5 shadow-2xl">
        <h2 class="text-lg font-black mb-6 tracking-tight flex items-center gap-3">
            <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
            PENGATURAN
        </h2>
        
        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 block">Pilih Kecerdasan</label>
                <select id="modelSelect" class="w-full p-4 bg-white/5 border border-white/5 rounded-2xl text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 appearance-none">
                    <option value="qwen/qwen-32b">⚡ Qwen Turbo (Cepat)</option>
                    <option value="gemini-pro">⭐ Gemini Pro 1.5</option>
                    <option value="mistral">🧠 Mistral Large</option>
                </select>
            </div>

            <div class="pt-4 space-y-3">
                <button id="clearChatBtn" class="w-full p-4 rounded-2xl text-xs font-bold bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">HAPUS RIWAYAT CHAT</button>
                <button id="closeSettings" class="w-full p-4 rounded-2xl text-xs font-bold bg-white/5 text-slate-400">TUTUP</button>
            </div>
        </div>
    </div>
</div>

<script>
class MazkipayApp {
    constructor() {
        this.messages = [];
        this.uploadedFiles = [];
        this.selectedModel = 'qwen/qwen-32b';
        this.apiKeys = {
            groq: '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',
            gemini: 'AIzaSyBiwFcqui3_wOdyerlV_HI4g2H3jh1y5IQ',
            hf: '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'
        };

        this.init();
    }

    init() {
        this.bindEvents();
        setTimeout(() => {
            const ls = document.getElementById('loadingScreen');
            ls.style.opacity = '0';
            setTimeout(() => {
                ls.classList.add('hidden');
                document.getElementById('disclaimerScreen').classList.remove('hidden');
            }, 500);
        }, 2000);
    }

    bindEvents() {
        const chk = document.getElementById('disclaimerCheckbox');
        const startBtn = document.getElementById('startBtn');
        chk.addEventListener('change', () => startBtn.disabled = !chk.checked);
        
        startBtn.onclick = () => {
            document.getElementById('disclaimerScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            this.sendWelcomeMessage();
        };

        document.getElementById('sendBtn').onclick = () => this.sendMessage();
        
        const input = document.getElementById('messageInput');
        input.addEventListener('input', (e) => {
            e.target.style.height = 'auto';
            e.target.style.height = Math.min(e.target.scrollHeight, 128) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                e.preventDefault();
                this.sendMessage();
            }
        });

        document.getElementById('settingsBtn').onclick = () => this.toggleModal('settingsModal', true);
        document.getElementById('closeSettings').onclick = () => this.toggleModal('settingsModal', false);
        document.getElementById('modelSelect').onchange = (e) => {
            this.selectedModel = e.target.value;
            document.getElementById('modelLabel').innerText = e.target.options[e.target.selectedIndex].text.split('(')[0];
        };
        
        document.getElementById('fileUpload').onchange = (e) => this.handleFiles(e);
        document.getElementById('clearChatBtn').onclick = () => {
            if(confirm('Hapus semua pesan?')) {
                this.messages = [];
                this.messagesContainer.innerHTML = '';
                this.sendWelcomeMessage();
                this.toggleModal('settingsModal', false);
            }
        };
    }

    sendWelcomeMessage() {
        const welcome = {
            role: 'ai',
            text: "Halo! Selamat datang di **MazkipayGPT**. 👋\n\nSaya asisten AI yang siap membantu kebutuhan Anda tanpa batasan. Silakan ajukan pertanyaan atau kirim file untuk saya analisis. Bagaimana saya bisa membantu Anda hari ini?"
        };
        this.messages.push(welcome);
        this.renderMessages();
    }

    toggleModal(id, show) {
        document.getElementById(id).classList.toggle('hidden', !show);
    }

    handleFiles(e) {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                this.uploadedFiles.push({ name: file.name, type: file.type, data: ev.target.result });
                this.renderUploadPreview();
            };
            reader.readAsDataURL(file);
        });
    }

    renderUploadPreview() {
        const container = document.getElementById('uploadPreview');
        container.innerHTML = '';
        if(this.uploadedFiles.length === 0) {
            container.classList.add('hidden');
            return;
        }
        container.classList.remove('hidden');
        this.uploadedFiles.forEach((file, idx) => {
            const div = document.createElement('div');
            div.className = "relative flex-shrink-0 w-12 h-12 bg-white/5 rounded-xl border border-white/5 overflow-hidden";
            div.innerHTML = file.type.includes('image') 
                ? `<img src="${file.data}" class="w-full h-full object-cover">` 
                : `<div class="w-full h-full flex items-center justify-center text-[8px] p-1 text-center truncate">${file.name}</div>`;
            
            const del = document.createElement('button');
            del.className = "absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs";
            del.innerHTML = "×";
            del.onclick = () => {
                this.uploadedFiles.splice(idx, 1);
                this.renderUploadPreview();
            };
            div.appendChild(del);
            container.appendChild(div);
        });
    }

    async sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text && this.uploadedFiles.length === 0) return;

        const userMsg = { role: 'user', text, files: [...this.uploadedFiles] };
        this.messages.push(userMsg);
        this.uploadedFiles = [];
        this.renderUploadPreview();
        input.value = '';
        input.style.height = 'auto';
        
        this.renderMessages();
        this.scrollToBottom();

        // AI Placeholder
        const aiIdx = this.messages.length;
        this.messages.push({ role: 'ai', text: '...' });
        this.renderMessages();

        try {
            const response = await this.callAI(text);
            this.messages[aiIdx].text = response;
        } catch (err) {
            this.messages[aiIdx].text = "⚠️ Galat: Sepertinya ada gangguan koneksi. Coba lagi nanti.";
        }
        this.renderMessages();
        this.scrollToBottom();
    }

    async callAI(prompt) {
        try {
            if (this.selectedModel === 'gemini-pro') return await this.callGemini(prompt);
            return await this.callGroq(prompt);
        } catch (e) {
            return "Maaf bro, limit API tercapai atau ada gangguan teknis.";
        }
    }

    async callGroq(prompt) {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${this.apiKeys.groq}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{role: "user", content: prompt}],
                temperature: 0.7
            })
        });
        const data = await res.json();
        return data.choices[0].message.content;
    }

    async callGemini(prompt) {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKeys.gemini}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    copyText(text) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        this.showToast();
    }

    renderMessages() {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = this.messages.map((m, idx) => `
            <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-msg">
                <div class="chat-bubble p-4 rounded-3xl shadow-lg ${m.role === 'user' ? 'user-bubble text-white' : 'ai-bubble text-slate-200'}">
                    ${m.files?.map(f => f.type.includes('image') 
                        ? `<img src="${f.data}" class="rounded-xl mb-3 max-h-60 w-full object-cover">` 
                        : `<div class="bg-white/5 p-3 rounded-xl mb-3 text-[10px] flex items-center gap-2">📂 ${f.name}</div>`
                    ).join('') || ''}
                    
                    <div class="text-[14px] leading-relaxed whitespace-pre-wrap">${m.text === '...' ? '<span class="flex gap-1 py-1"><span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0.1s"></span><span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0.2s"></span></span>' : m.text}</div>
                    
                    ${m.role === 'ai' && m.text !== '...' ? `
                        <div class="mt-3 pt-3 border-t border-white/5 flex items-center justify-between">
                            <span class="text-[8px] text-slate-500 font-bold tracking-widest uppercase">By.MazkiplayGpt</span>
                            <button onclick="app.copyText(\`${m.text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" class="copy-btn p-1.5 bg-white/5 hover:bg-white/10 rounded-lg transition-all">
                                <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    scrollToBottom() {
        const container = document.getElementById('messagesContainer');
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }
}

const app = new MazkipayApp();
</script>
</body>
</html>
