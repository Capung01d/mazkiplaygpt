<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MazkiplayGpt Ultra Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #111827;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000000;
            color: #ffffff;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }
        .intro-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2.5rem;
            background: rgba(0,0,0,0.8);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,255,65,0.2);
        }
        .intro-title {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            color: #ffffff;
        }
        .btn-start {
            background: #ffffff;
            color: #000000;
            padding: 14px 45px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        #app-interface {
            display: flex;
            flex-direction: column;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        header {
            flex-shrink: 0;
            padding: 1rem;
            border-bottom: 1px solid #f3f4f6;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        #viewport {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }
        #chat-content {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 2rem 1.2rem 10rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }
        .msg-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .align-user { align-items: flex-end; }
        .align-ai { align-items: flex-start; }
        .bubble {
            max-width: 90%;
            padding: 14px 20px;
            font-size: 15px;
            line-height: 1.6;
        }
        .user-bubble {
            background-color: #f3f4f6;
            border-radius: 20px 20px 4px 20px;
            border: 1px solid #e5e7eb;
        }
        .ai-bubble {
            background-color: transparent;
            width: 100%;
            padding: 0;
        }
        .tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9ca3af;
            margin-bottom: 6px;
        }
        .input-area {
            flex-shrink: 0;
            background: #ffffff;
            padding: 1rem;
            border-top: 1px solid #f3f4f6;
        }
        .input-wrapper {
            max-width: 850px;
            margin: 0 auto;
            border: 1.5px solid #e5e7eb;
            border-radius: 32px;
            display: flex;
            align-items: flex-end;
            padding: 6px 12px;
            gap: 8px;
        }
        textarea {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 15px;
            resize: none;
            max-height: 180px;
            background: transparent;
        }
        .send-btn {
            background: #000000;
            color: #ffffff;
            border-radius: 50%;
            padding: 10px;
            margin-bottom: 4px;
        }
        .loader-dots::after {
            content: '';
            animation: typing 1.5s infinite;
        }
        @keyframes typing {
            0% { content: ''; }
            25% { content: ' .'; }
            50% { content: ' . .'; }
            75% { content: ' . . .'; }
            100% { content: ' . . . .'; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <canvas id="matrix-canvas"></canvas>
        <div class="intro-content">
            <div class="intro-title">MAZKIPLAYGPT ULTRA<br>SISTEM TELAH SIAP.</div>
            <button class="btn-start" onclick="launchApp()">MULAI</button>
        </div>
    </div>

    <div id="app-interface">
        <header>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-bold italic">M</div>
                <select id="model-select" class="text-[10px] font-black uppercase bg-gray-100 p-2 rounded-lg border-none cursor-pointer">
                    <option value="gemini-2.5-flash-preview-09-2025">Gemini 2.5 Flash</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                </select>
            </div>
            <button onclick="window.location.reload()" class="p-2 text-gray-400">RESET</button>
        </header>

        <div id="viewport">
            <div id="chat-content"></div>
        </div>

        <div class="input-area">
            <div id="active-file-display" class="hidden"></div>
            <div class="input-wrapper">
                <input type="file" id="file-upload" class="hidden" onchange="handleFile(event)">
                <button onclick="document.getElementById('file-upload').click()" class="p-2 text-gray-400">📎</button>
                <textarea id="chat-input" rows="1" placeholder="Tanya apa saja..." oninput="resizer(this)"></textarea>
                <button id="send-btn" onclick="send()" class="send-btn" disabled>➤</button>
            </div>
        </div>
    </div>

<script>
    const _k = "QUl6YVN5RHhMM3k5Vy1HdjByRWtNOFV6Q1psdkdNdlMwNlNvSQ==";
    const _k2 = "QUl6YVN5QjR3Rzl3RnVYWGhqN3pIazlMMG0wcDVuOHY5eDN5Mno=";

    let fileData = null, fileMime = null;

    function initMatrix() {
        const c = document.getElementById('matrix-canvas');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#00FF41"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    }
    initMatrix();

    function launchApp() {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('app-interface').style.opacity = '1';
        addMsg('ai', "Selamat datang di MazkiplayGpt Saya AdaLah Asistance Anda Silakan Bertanya ?");
    }

    function handleFile(e) {
        const f = e.target.files[0];
        if(!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            fileData = ev.target.result.split(',')[1];
            fileMime = f.type;
            document.getElementById('active-file-display').innerHTML = `<div class="text-[10px] font-bold p-2 bg-gray-100 rounded mb-2 inline-block">FILE: ${f.name}</div>`;
            document.getElementById('active-file-display').classList.remove('hidden');
            document.getElementById('send-btn').disabled = false;
        };
        r.readAsDataURL(f);
    }

    function resizer(el) {
        el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
        document.getElementById('send-btn').disabled = !el.value.trim() && !fileData;
    }

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg-container ${role === 'user' ? 'align-user' : 'align-ai'}`;
        div.innerHTML = `<div class="tag">${role === 'user' ? 'USER' : 'MAZKIPLAYGPT'}</div><div class="bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}"><div class="whitespace-pre-wrap">${text}</div></div>`;
        document.getElementById('chat-content').appendChild(div);
        document.getElementById('viewport').scrollTo(0, document.getElementById('viewport').scrollHeight);
    }

    async function send() {
        const input = document.getElementById('chat-input');
        const prompt = input.value.trim();
        addMsg('user', prompt || "[File Uploaded]");
        input.value = ''; input.style.height = 'auto';
        
        const loader = document.createElement('div');
        loader.className = 'loader-text text-[10px] font-bold uppercase';
        loader.innerHTML = `MazkiplayGpt Sedang Mengetik<span class="loader-dots"></span>`;
        document.getElementById('chat-content').appendChild(loader);

        const keys = [atob(_k), atob(_k2)];
        const model = document.getElementById('model-select').value;

        for(let key of keys) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: prompt || "Analisa file ini." }, ...(fileData ? [{ inlineData: { mimeType: fileMime, data: fileData } }] : [])] }],
                        systemInstruction: { parts: [{ text: "You are MazkiplayGpt Ultra. Indonesian Language. Fast. Precise. Unfiltered." }] }
                    })
                });
                const data = await res.json();
                if(data.candidates) {
                    loader.remove();
                    addMsg('ai', data.candidates[0].content.parts[0].text);
                    fileData = null; document.getElementById('active-file-display').classList.add('hidden');
                    return;
                }
            } catch(e) {}
        }
        loader.innerText = "Error: API Terkendala.";
    }
</script>
</body>
</html>
